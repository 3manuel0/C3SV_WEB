<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>wasm</title>
  </head>
  <style>
    body {
      background-color: #121212;
      height: 100vh;
      display: flex;
      margin: 0;
      padding: 0;
      flex-direction: column;
      align-items: center;
      font-family: monospace, Courier;
    }

    #console {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-height: 60%;
    }

    label {
      color: #fff;
      font-family: monospace;
      font-size: 1.2rem;
    }

    #terminal {
      background: black;
      color: #cdd6f4;
      font-family: monospace, Courier;
      padding: 1rem 2rem;
      height: fit-content;
      width: 90%;
      margin: 0;
      overflow-y: auto;
      white-space: pre-wrap;
    }

    .file-input {
      display: inline-block;
      position: relative;
      cursor: pointer;
    }

    .file-input input[type="file"] {
      display: none;
    }

    .file-input span {
      display: inline-block;
      padding: 10px 18px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e5e7eb;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    .file-input span:hover {
      background: #334155;
      border-color: #475569;
    }

    .file-input span:active {
      transform: scale(0.98);
    }

    .file-input input:focus + span {
      outline: 2px solid #3b82f6;
      outline-offset: 2px;
    }

    /* Table Container */
    .table-container {
      margin-top: 20px auto;
      overflow: auto;
      max-height: 400px;
      width: 80%;
      border: 1px solid #2a2f3a;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #161a22;
    }

    /* Table Styling */
    table {
      border-collapse: collapse;
      width: 80%;
      min-width: 400px;
    }

    /* Header */
    thead {
      background: #1c2230;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    th,
    td {
      border: 1px solid #2a2f3a;
      padding: 8px 12px;
      text-align: left;
      white-space: nowrap;
      color: #e6e6e6;
    }

    /* Header cells */
    th {
      font-weight: bold;
      color: #ffffff;
    }

    /* Row hover */
    tbody tr:hover {
      background: #222838;
    }

    /* Alternate rows */
    tbody tr:nth-child(even) {
      background: #1a1f2b;
    }
  </style>
  <body>
    <div class="table-container">
      <table id="csvTable">
        <thead></thead>
        <tbody></tbody>
      </table>
    </div>
    <label class="file-input">
      <input type="file" name="csv" id="csv" />
      <span>Choose CSV file</span>
    </label>
    <div id="console">
      <label for="terminal">_terminal_</label>
      <pre id="terminal"></pre>
    </div>
  </body>
  <script src="https://cdn.jsdelivr.net/gh/3manuel0/gamelib@latest/wasmlib.js
  "></script>
  <script src="script.js"></script>
</html>
